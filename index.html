<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Türkiye Hava Durumu & Meteoroloji İstasyonu</title>
    <style>
        :root {
            /* Dinamik Tema Renkleri (Hava Durumuna Göre Değişir) */
            --bg-top: #1e2024; 
            --bg-bottom: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-dark: rgba(0, 0, 0, 0.25);
            --accent: #fbbf24; 
            --text-main: #f8fafc; 
            --text-dark: #000000;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            background-attachment: fixed;
            transition: background 1.5s ease-in-out;
            color: var(--text-main); 
            margin: 0; 
            padding: 20px;
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
        }

        /* Vektörel İkon Animasyonları */
        @keyframes rainFall { 0% { transform: translateY(-3px); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(5px); opacity: 0; } }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes snowFall { 0% { transform: translateY(-2px) rotate(0deg); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(4px) rotate(45deg); opacity: 0; } }
        .rain { animation: rainFall 1.2s infinite linear; } 
        .snow { animation: snowFall 2s infinite linear; } 
        .lightning { animation: flash 1.5s infinite ease-in-out; }

        .app-container { width: 100%; max-width: 500px; padding-bottom: 40px; }
        
        /* Kontrol Paneli */
        .controls { display: flex; gap: 10px; margin-bottom: 25px; }
        select, input[type="date"] {
            flex: 1; 
            padding: 15px; 
            border-radius: 15px; 
            background: #ffffff; 
            color: var(--text-dark); 
            border: 2px solid var(--accent); 
            font-size: 1rem; 
            font-weight: 700; 
            outline: none; 
            cursor: pointer;
        }

        /* Ana Hava Durumu Kartı */
        .now-card {
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 35px; 
            padding: 30px 20px; 
            text-align: center; 
            margin-bottom: 25px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }
        #top-date-clock { font-size: 1.1rem; font-weight: 600; opacity: 0.8; margin-bottom: 5px; letter-spacing: 2px; }
        #city-title { font-weight: 800; color: var(--accent); font-size: 2.2rem; margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .main-temp { font-size: 5.5rem; font-weight: 900; margin: 5px 0; line-height: 1; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .main-desc { font-size: 1.2rem; background: rgba(255,255,255,0.15); padding: 8px 25px; border-radius: 50px; display: inline-block; margin-bottom: 15px; font-weight: 600; }
        .comparison-badge { display: inline-block; margin-bottom: 20px; padding: 6px 18px; border-radius: 20px; background: rgba(0,0,0,0.4); font-size: 0.95rem; font-weight: 600; border: 1px solid rgba(255,255,255,0.1); }

        /* Yapay Zeka Asistanı */
        .ai-assistant { background: rgba(251, 191, 36, 0.15); color: #fbbf24; padding: 12px; border-radius: 15px; font-size: 0.95rem; font-weight: 600; margin-bottom: 20px; border: 1px dashed rgba(251, 191, 36, 0.5); line-height: 1.4; }

        /* 4'lü Meteoroloji Grid Paneli */
        .grid-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .grid-item { background: var(--glass-dark); padding: 15px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .grid-item .title { font-size: 0.75rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .grid-item .val { font-size: 1.2rem; font-weight: 700; }
        .grid-item .sub { font-size: 0.8rem; opacity: 0.8; margin-top: 5px; color: var(--accent); }

        .section-title { font-size: 0.8rem; opacity: 0.7; margin: 25px 0 12px 10px; text-transform: uppercase; letter-spacing: 1.5px; }

        /* 10 Günlük Liste ve Akordeon */
        .daily-item { background: var(--glass); border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .daily-row { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; cursor: pointer; transition: background 0.3s; }
        .daily-row:hover { background: rgba(255,255,255,0.05); }
        .daily-details { max-height: 0; opacity: 0; transition: all 0.4s ease; background: rgba(0,0,0,0.3); }
        .daily-details.open { max-height: 160px; opacity: 1; padding: 15px 0; }
        
        svg { vertical-align: middle; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="controls">
            <select id="city-select"></select>
            <input type="date" id="date-select" title="Geçmiş veya bugünü seçin">
        </div>

        <div class="now-card">
            <div id="top-date-clock">--:--:--</div>
            <div id="city-title">YÜKLENİYOR...</div>
            <div id="m-icon" style="margin: 15px 0;"></div>
            <div class="main-temp"><span id="m-temp">--</span>°</div>
            <div id="m-desc" class="main-desc">Veriler Çekiliyor...</div><br>
            
            <div id="m-comparison" class="comparison-badge">Analiz ediliyor...</div>
            <div id="m-assistant" class="ai-assistant">🤖 Sistem Başlatılıyor...</div>
        </div>

        <div class="grid-panel">
            <div class="grid-item">
                <div class="title">Hava Kalitesi</div>
                <div class="val" id="aqi-val">--</div>
                <div class="sub" id="aqi-sub">--</div>
            </div>
            <div class="grid-item">
                <div class="title">Rüzgar & Yön</div>
                <div class="val" id="wind-val">-- km/s</div>
                <div class="sub" id="wind-sub">--</div>
            </div>
            <div class="grid-item">
                <div class="title">Güneş & UV</div>
                <div class="val" id="sun-val">-- / --</div>
                <div class="sub" id="uv-sub">UV: --</div>
            </div>
            <div class="grid-item">
                <div class="title">Nem & Yağış</div>
                <div class="val" id="hum-val">%--</div>
                <div class="sub" id="prec-sub">-- mm</div>
            </div>
        </div>

        <div class="section-title">24 Saatlik Akış</div>
        <div id="h-scroll" style="display:flex; overflow-x:auto; gap:10px; padding-bottom:15px; scrollbar-width:none;"></div>

        <div class="section-title">10 Günlük Tahmin Paneli</div>
        <div id="d-list"></div>
    </div>

    <script>
        // --- TARİH VE SAAT SİSTEMİ ---
        let clockInterval;
        const dateInput = document.getElementById('date-select');
        const todayStr = new Date().toISOString().split('T')[0];
        dateInput.max = todayStr; 
        dateInput.value = todayStr;

        function startClock() {
            clearInterval(clockInterval);
            clockInterval = setInterval(() => {
                const now = new Date();
                document.getElementById('top-date-clock').innerText = `${now.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' })} | ${now.toLocaleTimeString('tr-TR')}`;
            }, 1000);
        }

        function setStaticDate(dateString) {
            clearInterval(clockInterval);
            const d = new Date(dateString);
            document.getElementById('top-date-clock').innerText = `📅 ${d.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric', weekday: 'long' })}`;
        }

        // --- İLK GÖNDERDİĞİN TAM 81 İL LİSTESİ ---
        const rawCities = [
            {n:"Adana", la:36.99, lo:35.32}, {n:"Adıyaman", la:37.76, lo:38.27}, {n:"Afyonkarahisar", la:38.75, lo:30.53}, {n:"Ağrı", la:39.71, lo:43.04}, {n:"Amasya", la:40.65, lo:35.83}, {n:"Ankara", la:39.93, lo:32.85}, {n:"Antalya", la:36.88, lo:30.70}, {n:"Artvin", la:41.18, lo:41.81}, {n:"Aydın", la:37.84, lo:27.84}, {n:"Balıkesir", la:39.64, lo:27.88}, {n:"Bilecik", la:40.14, lo:29.97}, {n:"Bingöl", la:38.88, lo:40.50}, {n:"Bitlis", la:38.40, lo:42.10}, {n:"Bolu", la:40.73, lo:31.60}, {n:"Burdur", la:37.72, lo:30.28}, {n:"Bursa", la:40.18, lo:29.06}, {n:"Çanakkale", la:40.15, lo:26.40}, {n:"Çankırı", la:40.60, lo:33.61}, {n:"Çorum", la:40.55, lo:34.95}, {n:"Denizli", la:37.77, lo:29.08}, {n:"Diyarbakır", la:37.91, lo:40.24}, {n:"Edirne", la:41.67, lo:26.55}, {n:"Elazığ", la:38.68, lo:39.22}, {n:"Erzincan", la:39.75, lo:39.49}, {n:"Erzurum", la:39.90, lo:41.27}, {n:"Eskişehir", la:39.77, lo:30.52}, {n:"Gaziantep", la:37.06, lo:37.38}, {n:"Giresun", la:40.91, lo:38.38}, {n:"Gümüşhane", la:40.46, lo:39.47}, {n:"Hakkari", la:37.57, lo:43.73}, {n:"Hatay", la:36.20, lo:36.15}, {n:"Isparta", la:37.76, lo:30.55}, {n:"Mersin", la:36.81, lo:34.63}, {n:"İstanbul", la:41.00, lo:28.97}, {n:"İzmir", la:38.41, lo:27.12}, {n:"Kars", la:40.61, lo:43.06}, {n:"Kastamonu", la:41.38, lo:33.77}, {n:"Kayseri", la:38.73, lo:35.48}, {n:"Kırklareli", la:41.73, lo:27.22}, {n:"Kırşehir", la:39.14, lo:34.16}, {n:"Kocaeli", la:40.85, lo:29.88}, {n:"Konya", la:37.87, lo:32.48}, {n:"Kütahya", la:39.41, lo:29.98}, {n:"Malatya", la:38.35, lo:38.33}, {n:"Manisa", la:38.61, lo:27.42}, {n:"Kahramanmaraş", la:37.57, lo:36.92}, {n:"Mardin", la:37.31, lo:40.73}, {n:"Muğla", la:37.21, lo:28.36}, {n:"Muş", la:38.94, lo:41.75}, {n:"Nevşehir", la:38.62, lo:34.71}, {n:"Niğde", la:37.96, lo:34.67}, {n:"Ordu", la:40.98, lo:37.87}, {n:"Rize", la:41.02, lo:40.52}, {n:"Sakarya", la:40.75, lo:30.38}, {n:"Samsun", la:41.28, lo:36.33}, {n:"Siirt", la:37.92, lo:41.94}, {n:"Sinop", la:42.02, lo:35.15}, {n:"Sivas", la:39.74, lo:37.01}, {n:"Tekirdağ", la:40.97, lo:27.51}, {n:"Tokat", la:40.31, lo:36.55}, {n:"Trabzon", la:41.00, lo:39.71}, {n:"Tunceli", la:39.10, lo:39.54}, {n:"Şanlıurfa", la:37.15, lo:38.79}, {n:"Uşak", la:38.68, lo:29.40}, {n:"Van", la:38.48, lo:43.38}, {n:"Yozgat", la:39.81, lo:34.80}, {n:"Zonguldak", la:41.45, lo:31.79}, {n:"Aksaray", la:38.36, lo:34.03}, {n:"Bayburt", la:40.25, lo:39.93}, {n:"Karaman", la:37.17, lo:33.22}, {n:"Kırıkkale", la:39.84, lo:33.51}, {n:"Batman", la:37.88, lo:41.12}, {n:"Şırnak", la:37.51, lo:42.45}, {n:"Bartın", la:41.63, lo:32.33}, {n:"Ardahan", la:41.11, lo:42.70}, {n:"Iğdır", la:39.91, lo:44.04}, {n:"Yalova", la:40.65, lo:29.27}, {n:"Karabük", la:41.20, lo:32.62}, {n:"Kilis", la:36.71, lo:37.11}, {n:"Osmaniye", la:37.07, lo:36.24}, {n:"Düzce", la:40.84, lo:31.15}
        ];

        rawCities.sort((a, b) => a.n.localeCompare(b.n, 'tr'));
        const select = document.getElementById('city-select');
        rawCities.forEach(c => { select.innerHTML += `<option value="${c.la},${c.lo}">${c.n}</option>`; });

        // --- YARDIMCI VE ANALİZ FONKSİYONLARI ---
        const getWindDir = (deg) => {
            if (deg >= 337 || deg < 22) return 'Kuzey (N)';
            if (deg >= 22 && deg < 67) return 'Kuzeydoğu (NE)';
            if (deg >= 67 && deg < 112) return 'Doğu (E)';
            if (deg >= 112 && deg < 157) return 'Güneydoğu (SE)';
            if (deg >= 157 && deg < 202) return 'Güney (S)';
            if (deg >= 202 && deg < 247) return 'Güneybatı (SW)';
            if (deg >= 247 && deg < 292) return 'Batı (W)';
            return 'Kuzeybatı (NW)';
        };

        const getAQIText = (aqi) => {
            if (!aqi) return { t: "Veri Yok", c: "gray" };
            if (aqi <= 50) return { t: "İyi / Temiz 🌿", c: "#4caf50" };
            if (aqi <= 100) return { t: "Orta ⚠️", c: "#ffeb3b" };
            return { t: "Kötü / Riskli 😷", c: "#f44336" };
        };

        const generateAdvice = (temp, code) => {
            if ([71, 73, 75, 77, 85, 86].includes(code)) return "Sıkı giyin, yollar kaygan olabilir. Bere ve eldiven şart! 🧣❄️";
            if ([51, 53, 56, 61, 63, 65, 80, 81, 82].includes(code)) return "Yağmurlu bir gün. Şemsiyeni ve su geçirmez ayakkabını unutma. ☔🌂";
            if ([95, 96, 99].includes(code)) return "Fırtına uyarısı! Zorunlu değilsen dışarı çıkma, güvende kal. ⚡🏠";
            if (temp > 28) return "Hava çok sıcak. Bol su iç, şapka tak ve güneş kremi sürmeden çıkma! 💧🧢";
            if (temp < 10) return "Hava oldukça serin. Kalın bir mont veya ceket tercih etmelisin. 🧥";
            if ([0, 1].includes(code)) return "Açık ve güzel bir hava. Dışarıda vakit geçirmek için harika bir gün! 🚶‍♂️🌤️";
            return "Hava dengeli, rahat kıyafetlerinle günün tadını çıkar. 👕";
        };

        function updateTheme(code) {
            const r = document.documentElement.style;
            if ([0, 1].includes(code)) { r.setProperty('--bg-top', '#2b4b6f'); r.setProperty('--bg-bottom', '#0f2027'); }
            else if ([2, 3].includes(code)) { r.setProperty('--bg-top', '#3E5151'); r.setProperty('--bg-bottom', '#1a1a1d'); }
            else if ([51, 61, 63, 65, 80, 81, 82].includes(code)) { r.setProperty('--bg-top', '#141E30'); r.setProperty('--bg-bottom', '#243B55'); }
            else if ([71, 73, 75, 85].includes(code)) { r.setProperty('--bg-top', '#7b92b6'); r.setProperty('--bg-bottom', '#2c3e50'); }
            else if ([95, 96, 99].includes(code)) { r.setProperty('--bg-top', '#0f0c29'); r.setProperty('--bg-bottom', '#302b63'); }
            else { r.setProperty('--bg-top', '#1e2024'); r.setProperty('--bg-bottom', '#0a0a0c'); }
        }

        // --- MODERN SVG İKON SİSTEMİ ---
        function getIconSVG(code, size=48) {
            const s = `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">`;
            const e = `</svg>`;
            const sun = `<circle cx="12" cy="12" r="4" stroke="#fbbf24" stroke-width="2"/><path d="M12 4v-2M12 22v-2M4 12H2M22 12h-2M6.34 6.34L4.93 4.93M19.07 19.07l-1.41-1.41M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" stroke="#fbbf24" stroke-width="2"/>`;
            const cld = `<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" stroke="#f8fafc" stroke-width="2" fill="rgba(255,255,255,0.05)"/>`;
            const r1 = `<path class="rain" d="M12 20v2" stroke="#60a5fa" stroke-width="2"/>`;
            const r3 = `<path class="rain" d="M8 19v4M12 19v3M16 19v4" stroke="#2563eb" stroke-width="3"/>`;
            const snw = `<path class="snow" d="M12 20v2M11 21h2M9 19v2M8 20h2M15 19v2M14 20h2" stroke="#e0f2fe" stroke-width="2"/>`;
            const lgh = `<path class="lightning" d="M13 10V3L5 14h6v7l8-11h-6z" stroke="#fde047" stroke-width="2" fill="rgba(253,224,71,0.3)"/>`;

            let i = "";
            if ([0, 1].includes(code)) i = sun;
            else if (code === 2) i = `<g transform="translate(-5, -6) scale(0.8)">${sun}</g>` + cld;
            else if (code === 3 || code === 45 || code === 48) i = cld;
            else if ([51, 53, 56, 61, 66].includes(code)) i = cld + r1;
            else if ([55, 57, 63, 65, 67, 80, 81, 82].includes(code)) i = cld + r3;
            else if ([71, 73, 75, 77, 85, 86].includes(code)) i = cld + snw;
            else if ([95, 96, 99].includes(code)) i = cld + lgh + r3;
            else i = sun;
            return s + i + e;
        }

        const weatherMap = {
            0:"Açık", 1:"Çoğunlukla Açık", 2:"Parçalı Bulutlu", 3:"Kapalı", 
            45:"Sisli", 48:"Kırağılı Sis", 51:"Çiseleme", 53:"Çiseleme", 55:"Yoğun Çiseleme",
            61:"Hafif Yağmur", 63:"Yağmurlu", 65:"Şiddetli Yağmur", 
            71:"Hafif Kar", 73:"Karlı", 75:"Yoğun Kar", 77:"Kar Taneleri",
            80:"Sağanak", 81:"Sağanak", 82:"Şiddetli Sağanak", 
            95:"Fırtına", 96:"Dolulu Fırtına", 99:"Şiddetli Fırtına"
        };
        const getW = (c) => ({ code: c, text: weatherMap[c] || "Bilinmiyor" });

        // --- MERKEZİ VERİ ÇEKME MOTORU ---
        async function fetchWeather() {
            const [la, lo] = select.value.split(',');
            const name = select.options[select.selectedIndex].text;
            const sDate = dateInput.value;
            const isHist = sDate !== todayStr;
            
            document.getElementById('city-title').innerText = name.toUpperCase();
            localStorage.setItem('lastCityCoord', select.value);
            
            if (isHist) setStaticDate(sDate); else startClock();

            try {
                let wUrl = "", aqUrl = "";
                // Tarih hesaplamaları (Dün ve 9 Gün Sonrası)
                let d1 = new Date(sDate); d1.setDate(d1.getDate() - 1); let pDate = d1.toISOString().split('T')[0];
                let d10 = new Date(sDate); d10.setDate(d10.getDate() + 9); let eDate = d10.toISOString().split('T')[0];

                if (isHist) {
                    // Geçmiş Tarih (Archive API)
                    wUrl = `https://archive-api.open-meteo.com/v1/era5?latitude=${la}&longitude=${lo}&start_date=${pDate}&end_date=${eDate}&hourly=temperature_2m,relative_humidity_2m,precipitation,weather_code,wind_speed_10m,wind_direction_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset&timezone=auto`;
                } else {
                    // Bugün ve Gelecek (Forecast API)
                    wUrl = `https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}&current=temperature_2m,relative_humidity_2m,precipitation,weather_code,wind_speed_10m,wind_direction_10m&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,uv_index_max&timezone=auto&forecast_days=10&past_days=1`;
                    aqUrl = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${la}&longitude=${lo}&current=european_aqi,pm10,pm2_5&timezone=auto`;
                }

                const [wRes, aqRes] = await Promise.all([ fetch(wUrl), isHist ? null : fetch(aqUrl) ]);
                const wData = await wRes.json();
                const aqData = aqRes ? await aqRes.json() : null;

                let cCode, cTemp, cHum, cPrec, cWind, cWindDir, pTemp;
                
                // Veri Ayrıştırma Mantığı
                if (isHist) {
                    // Arşivde 0. gün dündür. Seçili gün 1. gündür. (24 saat atla, öğlen 12'yi baz al -> 36)
                    cCode = wData.hourly.weather_code[36]; cTemp = wData.hourly.temperature_2m[36];
                    cHum = wData.hourly.relative_humidity_2m[36]; cPrec = wData.hourly.precipitation[36];
                    cWind = wData.hourly.wind_speed_10m[36]; cWindDir = wData.hourly.wind_direction_10m[36];
                    pTemp = wData.hourly.temperature_2m[12]; // Dün öğlen
                } else {
                    cCode = wData.current.weather_code; cTemp = wData.current.temperature_2m;
                    cHum = wData.current.relative_humidity_2m; cPrec = wData.current.precipitation;
                    cWind = wData.current.wind_speed_10m; cWindDir = wData.current.wind_direction_10m;
                    pTemp = wData.hourly.temperature_2m[new Date().getHours()]; // Dün şu anki saat
                }

                updateTheme(cCode);
                const info = getW(cCode);

                // Ana Kart Verileri
                document.getElementById('m-icon').innerHTML = getIconSVG(info.code, 130);
                document.getElementById('m-temp').innerText = Math.round(cTemp);
                document.getElementById('m-desc').innerText = info.text;
                document.getElementById('m-assistant').innerText = `🤖 Asistan: ${generateAdvice(cTemp, cCode)}`;

                // Hisse Analizi Rozeti
                const tDiff = Math.round(cTemp) - Math.round(pTemp);
                const bdg = document.getElementById('m-comparison');
                if (tDiff > 0) { bdg.innerHTML = `Düne göre ${Math.abs(tDiff)}° daha sıcak 📈`; bdg.style.color = "#ffb74d"; }
                else if (tDiff < 0) { bdg.innerHTML = `Düne göre ${Math.abs(tDiff)}° daha soğuk 📉`; bdg.style.color = "#64b5f6"; }
                else { bdg.innerHTML = `Sıcaklık dünkü ile aynı ⚖️`; bdg.style.color = "#81c784"; }

                // Grid Verileri
                document.getElementById('wind-val').innerText = `${cWind} km/s`;
                document.getElementById('wind-sub').innerText = getWindDir(cWindDir);
                document.getElementById('hum-val').innerText = `%${cHum}`;
                document.getElementById('prec-sub').innerText = `${cPrec} mm yağış`;
                
                const dIdx = isHist ? 1 : 0;
                const sr = new Date(wData.daily.sunrise[dIdx]).toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
                const ss = new Date(wData.daily.sunset[dIdx]).toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
                document.getElementById('sun-val').innerText = `${sr} / ${ss}`;
                document.getElementById('uv-sub').innerText = isHist ? "UV (Arşivde Yok)" : `Max UV İndeksi: ${wData.daily.uv_index_max[0]}`;

                const aqiDOM = document.getElementById('aqi-val');
                const aqiSub = document.getElementById('aqi-sub');
                if (aqData) {
                    const aq = getAQIText(aqData.current.european_aqi);
                    aqiDOM.innerText = aqData.current.european_aqi;
                    aqiDOM.style.color = aq.c;
                    aqiSub.innerText = `${aq.t} (PM2.5: ${aqData.current.pm2_5})`;
                } else {
                    aqiDOM.innerText = "N/A"; aqiDOM.style.color = "var(--text-main)";
                    aqiSub.innerText = "Sadece güncel veride aktiftir";
                }

                // 24 Saatlik Akış (Yatay Kaydırma)
                const hScroll = document.getElementById('h-scroll'); hScroll.innerHTML = "";
                const sIdx = isHist ? 24 : 24; // İlk 24 saat düne ait, biz seçilen günü alıyoruz.
                for(let i=0; i<24; i++) {
                    const idx = sIdx + i;
                    const hInfo = getW(wData.hourly.weather_code[idx]);
                    hScroll.innerHTML += `
                        <div style="min-width:90px; background:rgba(255,255,255,0.05); border-radius:20px; padding:15px 5px; text-align:center; border:1px solid rgba(255,255,255,0.05); display:flex; flex-direction:column; justify-content:space-between; gap:8px;">
                            <div style="font-size:0.85rem; font-weight:600; opacity:0.7">${i<10?'0'+i:i}:00</div>
                            <div>${getIconSVG(hInfo.code, 38)}</div>
                            <div style="font-size:0.75rem; color:var(--accent); font-weight:600; height:15px;">${hInfo.text}</div>
                            <div style="font-size:1.3rem; font-weight:800;">${Math.round(wData.hourly.temperature_2m[idx])}°</div>
                        </div>`;
                }

                // 10 Günlük Tahmin Paneli ve Akordeon Saatlik Detaylar
                const dList = document.getElementById('d-list'); dList.innerHTML = "";
                for(let i=0; i<10; i++) {
                    const realIdx = isHist ? i + 1 : i; 
                    if (!wData.daily.time[realIdx]) break; // Arşivin sınırına ulaşılırsa döngüyü kır

                    const dInfo = getW(wData.daily.weather_code[realIdx]);
                    const dateObj = new Date(wData.daily.time[realIdx]);
                    const dName = i === 0 ? "Bugün" : dateObj.toLocaleDateString('tr-TR', {weekday:'long', day:'numeric', month:'short'});
                    
                    let hrHTML = "";
                    for(let h=0; h<24; h+=2) { 
                        const hrIdx = (realIdx * 24) + h;
                        const hrInfo = getW(wData.hourly.weather_code[hrIdx]);
                        hrHTML += `<div style="text-align:center; min-width:60px; padding: 5px;">
                                    <div style="font-size:0.7rem;opacity:0.7; margin-bottom:5px;">${h<10?'0'+h:h}:00</div>
                                    <div>${getIconSVG(hrInfo.code, 28)}</div>
                                    <div style="font-weight:700; margin-top:5px;">${Math.round(wData.hourly.temperature_2m[hrIdx])}°</div>
                                  </div>`;
                    }

                    dList.innerHTML += `
                        <div class="daily-item">
                            <div class="daily-row" onclick="this.nextElementSibling.classList.toggle('open')">
                                <span style="width:110px; font-weight:600">${dName}</span>
                                <span style="flex:1; text-align:center; display:flex; align-items:center; justify-content:center; gap:8px;">
                                    ${getIconSVG(dInfo.code, 28)} <span style="font-size:0.85rem; opacity:0.8;">${dInfo.text}</span>
                                </span>
                                <span style="width:85px;text-align:right; font-weight:700">${Math.round(wData.daily.temperature_2m_max[realIdx])}° / <small style="opacity:0.5; font-weight:400">${Math.round(wData.daily.temperature_2m_min[realIdx])}°</small></span>
                            </div>
                            <div class="daily-details">
                                <div style="display:flex; overflow-x:auto; padding:0 15px; gap:8px; scrollbar-width:none;">${hrHTML}</div>
                            </div>
                        </div>`;
                }

            } catch(e) { console.log("Hata:", e); }
        }

        // Başlangıç Ayarları ve Olay Dinleyicileri
        let savedCoord = localStorage.getItem('lastCityCoord');
        if(savedCoord && Array.from(select.options).some(opt => opt.value === savedCoord)) {
            select.value = savedCoord;
        }

        select.addEventListener('change', fetchWeather);
        dateInput.addEventListener('change', fetchWeather);
        fetchWeather();
    </script>
</body>
</html>
